apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: memory-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: memory-agent-api:latest
        imagePullPolicy: IfNotPresent
        command: ["uvicorn", "interface.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: memory-config
        - secretRef:
            name: memory-secrets
        livenessProbe:
          httpGet:
            path: /api
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /api
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: memory-system
spec:
  selector:
    app: api
  ports:
  - port: 8000
    targetPort: 8000
