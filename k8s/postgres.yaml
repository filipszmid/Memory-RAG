apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: memory-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: memory-secrets
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          value: "litellm"
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: memory-system
spec:
  selector:
    app: postgres
  ports:
  - protocol: TCP
    port: 5432
    targetPort: 5432
