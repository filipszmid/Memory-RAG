apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: memory-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        command: ["redis-server", "--save", "60", "1"]
---
apiVersion: v1
kind: Service
metadata:
  name: redis-master
  namespace: memory-system
spec:
  selector:
    app: redis
  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379
