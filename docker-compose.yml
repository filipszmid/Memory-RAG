name: memory-agent

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.routing.allocation.disk.threshold_enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  redis:
    image: redis:alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=litellm_pass
      - POSTGRES_DB=litellm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d litellm"]
      interval: 5s
      timeout: 5s
      retries: 5

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - LITELLM_SALT_KEY=${LITELLM_SALT_KEY}
      - LITELLM_DASHBOARD_USERNAME=${UI_USERNAME}
      - LITELLM_DASHBOARD_PASSWORD=${UI_PASSWORD}
      - DATABASE_URL=postgresql://postgres:litellm_pass@postgres:5432/litellm
      - LITELLM_DATABASE_URL=postgresql://postgres:litellm_pass@postgres:5432/litellm
      - LITELLM_MODE=${LITELLM_MODE}
      - USE_PRISMA_MIGRATE=${USE_PRISMA_MIGRATE}
      - STORE_MODEL_IN_DB=${STORE_MODEL_IN_DB}
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  api:
    build: .
    command: uvicorn interface.api.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ES_HOST=http://elasticsearch:9200
      - OLLAMA_BASE_URL=http://ollama:11434
      - REDIS_HOST=redis
      - LITELLM_PROXY_URL=http://litellm:4000
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: python src/worker.py
    volumes:
      - .:/app
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ES_HOST=http://elasticsearch:9200
      - REDIS_HOST=redis
      - LITELLM_PROXY_URL=http://litellm:4000
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama

  ui:
    build: .
    container_name: memory-ui
    command: streamlit run interface/ui/app.py --server.address 0.0.0.0
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000/api
    depends_on:
      - api
      - ollama

volumes:
  es_data:
  ollama_data:
  postgres_data:
